//
// An MPU-401 (UART mode) MIDI interface on the ISA bus. MIDI data sent by
// the guest is played on a host MIDI output device.
//
// VARIABLE: midi_out
//
// The host MIDI output device number to play on. The default is 0 (the
// Windows default MIDI device).

//mpu0 = mpu401
//{
//  midi_out = 0;
//}

// ES1370 audio card
//
// An Ensoniq AudioPCI ES1370 sound card. Requires the emulator to be
// compiled with SDL support. Takes no configuration values.

//pci1.1 = es1370 {}
}




